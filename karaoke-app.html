<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 KaraokeQ</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2e;
    --accent: #ff3cac;
    --accent2: #7928ca;
    --accent3: #00d4ff;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --success: #00ffaa;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(121, 40, 202, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 60, 172, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }
  .hidden { display: none !important; }

  /* MODE SELECTOR */
  .mode-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 32px;
    padding: 24px;
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(255,60,172,0.3)); }
    50% { filter: drop-shadow(0 0 40px rgba(121,40,202,0.5)); }
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: -20px;
  }

  .mode-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

  .mode-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 40px 48px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    min-width: 200px;
  }

  .mode-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 60px rgba(255,60,172,0.2); }
  .mode-card.tv:hover { border-color: var(--accent3); box-shadow: 0 20px 60px rgba(0,212,255,0.2); }

  .mode-icon { font-size: 52px; margin-bottom: 16px; }
  .mode-title { font-family: 'Black Han Sans', sans-serif; font-size: 22px; margin-bottom: 8px; }
  .mode-desc { color: var(--muted); font-size: 13px; line-height: 1.5; }

  /* PHONE VIEW */
  #phone-view { min-height: 100vh; display: flex; flex-direction: column; }

  .phone-header { padding: 20px 20px 0; display: flex; align-items: center; gap: 12px; }

  .back-btn {
    background: var(--surface);
    border: none;
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text); background: var(--surface2); }

  .phone-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .status-dot { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
  .dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .search-section { padding: 16px 20px; }

  .search-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    padding: 6px 6px 6px 20px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
  }
  .search-input::placeholder { color: var(--muted); }

  .search-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    transition: opacity 0.2s;
  }
  .search-btn:hover { opacity: 0.85; }

  .results-section { padding: 0 20px; flex: 1; overflow-y: auto; max-height: calc(100vh - 380px); }

  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 8px;
    transition: background 0.2s;
  }
  .result-item:hover { background: var(--surface); }

  .result-thumb { width: 72px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }

  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .result-channel { font-size: 11px; color: var(--muted); }

  .add-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--accent);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .add-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .add-btn.added { background: var(--success); border-color: var(--success); color: #000; pointer-events: none; }

  .queue-panel {
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 16px 20px;
    flex-shrink: 0;
  }

  .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

  .queue-count { font-size: 11px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

  .clear-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: color 0.2s; }
  .clear-btn:hover { color: var(--accent); }

  .queue-list { overflow-y: auto; max-height: 180px; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: var(--surface2);
  }
  .queue-item.playing { background: linear-gradient(135deg, rgba(255,60,172,0.15), rgba(121,40,202,0.15)); border: 1px solid rgba(255,60,172,0.3); }

  .queue-num { font-size: 11px; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
  .queue-item.playing .queue-num { color: var(--accent); animation: blink 1s infinite; }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .queue-thumb { width: 44px; height: 30px; border-radius: 6px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
  .queue-title { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
  .remove-btn:hover { color: var(--accent); }

  /* TV VIEW */
  #tv-view { min-height: 100vh; display: flex; flex-direction: column; background: #000; }
  .tv-main { flex: 1; position: relative; background: #000; }
  #tv-player { width: 100%; height: calc(100vh - 140px); border: none; }

  .tv-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    flex-direction: column;
    gap: 20px;
  }

  .tv-play-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 18px 40px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(255,60,172,0.3);
  }
  .tv-play-btn:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255,60,172,0.5); }
  .tv-play-btn.hidden { display: none; }

  .tv-idle-logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  .tv-idle-text { color: var(--muted); font-size: 18px; }

  .tv-queue-bar {
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 140px;
    overflow: hidden;
  }

  .tv-now-playing { flex-shrink: 0; width: 220px; }
  .tv-now-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .tv-now-title { font-family: 'Black Han Sans', sans-serif; font-size: 15px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tv-divider { width: 1px; height: 60px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

  .tv-up-next { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  .tv-queue-scroll { display: flex; gap: 12px; overflow: hidden; flex: 1; }

  .tv-queue-chip { background: var(--surface2); border-radius: 8px; padding: 8px 12px; flex-shrink: 0; max-width: 180px; display: flex; align-items: center; gap: 8px; }
  .tv-chip-num { font-size: 11px; color: var(--accent); font-weight: 600; flex-shrink: 0; }
  .tv-chip-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tv-controls { display: flex; gap: 10px; margin-left: auto; flex-shrink: 0; }

  .tv-btn {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tv-btn:hover { background: var(--accent); border-color: var(--accent); }
  .tv-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; }

  .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #000;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- MODE SELECTOR -->
  <div class="mode-selector" id="mode-selector">
    <div class="logo">🎤 KaraokeQ</div>
    <div class="subtitle">Choose your device</div>
    <div class="mode-cards">
      <div class="mode-card phone" onclick="showView('phone')">
        <div class="mode-icon">📱</div>
        <div class="mode-title">Phone</div>
        <div class="mode-desc">Search songs &<br>manage the queue</div>
      </div>
      <div class="mode-card tv" onclick="showView('tv')">
        <div class="mode-icon">📺</div>
        <div class="mode-title">TV</div>
        <div class="mode-desc">Full screen player<br>with queue display</div>
      </div>
    </div>
  </div>

  <!-- PHONE VIEW -->
  <div id="phone-view" class="hidden">
    <div class="phone-header">
      <button class="back-btn" onclick="showView('home')">←</button>
      <div class="phone-title">🎤 KaraokeQ</div>
      <div class="status-dot">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
    </div>

    <div class="search-section">
      <div class="search-box">
        <input class="search-input" id="search-input" type="text" placeholder="Search Korean songs..."
          onkeydown="if(event.key==='Enter') window.searchYouTube()">
        <button class="search-btn" onclick="window.searchYouTube()">Search</button>
      </div>
    </div>

    <div class="results-section" id="results-section">
      <div class="empty-state">Search for a song to get started 🎵</div>
    </div>

    <div class="queue-panel">
      <div class="queue-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="section-label" style="margin:0">Queue</div>
          <div class="queue-count" id="queue-count">0</div>
        </div>
        <button class="clear-btn" onclick="window.clearQueue()">Clear all</button>
      </div>
      <div class="queue-list" id="phone-queue-list">
        <div class="empty-state">No songs queued yet</div>
      </div>
    </div>
  </div>

  <!-- TV VIEW -->
  <div id="tv-view" class="hidden">
    <div class="tv-main">
      <div class="tv-overlay" id="tv-overlay">
        <div class="tv-idle-logo">🎤 KaraokeQ</div>
        <div class="tv-idle-text" id="tv-idle-text">Add songs from your phone to start</div>
        <button class="tv-play-btn hidden" id="tv-play-btn" onclick="window.openCurrentVideo()">▶ Play on YouTube</button>
      </div>
    </div>
    <div class="tv-queue-bar">
      <div class="tv-now-playing">
        <div class="tv-now-label">▶ Now Playing</div>
        <div class="tv-now-title" id="tv-now-title">—</div>
      </div>
      <div class="tv-divider"></div>
      <div style="flex:1;min-width:0;">
        <div class="tv-up-next">Up Next</div>
        <div class="tv-queue-scroll" id="tv-queue-scroll">
          <div style="color:var(--muted);font-size:13px;">Queue is empty</div>
        </div>
      </div>
      <div class="tv-controls">
        <button class="tv-btn" onclick="window.skipSong()">⏭ Skip</button>
        <button class="tv-btn primary" onclick="window.playNext()">▶ Play Next</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfZHQNoYOpUaBOhYIn2x3lr_BQuC6l62s",
    authDomain: "karaokeq-564b2.firebaseapp.com",
    databaseURL: "https://karaokeq-564b2-default-rtdb.firebaseio.com",
    projectId: "karaokeq-564b2",
    storageBucket: "karaokeq-564b2.firebasestorage.app",
    messagingSenderId: "149342264225",
    appId: "1:149342264225:web:24d626de87546757d249e0"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getDatabase(firebaseApp);

  const YT_KEY = 'AIzaSyBmydGkqWKuH1ecZ4dH1k667YlY0qFjWW0';

  let queue = [];
  let currentVideo = null;
  let currentView = 'home';
  let addedIds = new Set();

  // ── Firebase listeners ──
  onValue(ref(db, 'karaokeq/queue'), snap => {
    queue = snap.val() || [];
    addedIds = new Set(queue.map(v => v.videoId));
    if (currentView === 'phone') renderPhoneQueue();
    if (currentView === 'tv') renderTVQueue();
  });

  onValue(ref(db, 'karaokeq/current'), snap => {
    const prev = currentVideo?.videoId;
    currentVideo = snap.val() || null;
    if (currentView === 'tv' && currentVideo?.videoId !== prev) renderTVPlayer();
    if (currentView === 'phone') renderPhoneQueue();
  });

  onValue(ref(db, '.info/connected'), snap => {
    const ok = snap.val();
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (dot) dot.className = 'dot' + (ok ? ' connected' : '');
    if (txt) txt.textContent = ok ? 'Live' : 'Reconnecting...';
  });

  // ── DB helpers ──
  async function saveQueue() { await set(ref(db, 'karaokeq/queue'), queue.length ? queue : null); }
  async function saveCurrent() { await set(ref(db, 'karaokeq/current'), currentVideo || null); }

  // ── View ──
  window.showView = function(view) {
    currentView = view;
    document.getElementById('mode-selector').classList.toggle('hidden', view !== 'home');
    document.getElementById('phone-view').classList.toggle('hidden', view !== 'phone');
    document.getElementById('tv-view').classList.toggle('hidden', view !== 'tv');
    if (view === 'phone') renderPhoneQueue();
    if (view === 'tv') { renderTVPlayer(); renderTVQueue(); }
  };

  // ── Search ──
  window.searchYouTube = async function() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;
    const section = document.getElementById('results-section');
    section.innerHTML = `<div class="loading"><div class="spinner"></div>Searching...</div>`;
    try {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + ' 노래방 MR')}&type=video&maxResults=12&key=${YT_KEY}`;
      const data = await (await fetch(url)).json();
      if (!data.items?.length) { section.innerHTML = `<div class="empty-state">No results found</div>`; return; }
      section.innerHTML = `<div class="section-label">Results</div>`;
      data.items.forEach(item => {
        const vid = item.id.videoId;
        const title = item.snippet.title;
        const channel = item.snippet.channelTitle;
        const thumb = item.snippet.thumbnails.default.url;
        const isAdded = addedIds.has(vid);
        const el = document.createElement('div');
        el.className = 'result-item';
        el.innerHTML = `
          <img class="result-thumb" src="${thumb}" alt="">
          <div class="result-info">
            <div class="result-title">${esc(title)}</div>
            <div class="result-channel">${esc(channel)}</div>
          </div>
          <button class="add-btn ${isAdded ? 'added' : ''}" id="btn-${vid}">${isAdded ? '✓' : '+'}</button>
        `;
        el.querySelector('.add-btn').addEventListener('click', () => addToQueue(vid, title, thumb));
        section.appendChild(el);
      });
    } catch(e) { section.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`; }
  };

  // ── Queue ──
  async function addToQueue(videoId, title, thumb) {
    if (addedIds.has(videoId)) return;
    addedIds.add(videoId);
    const btn = document.getElementById(`btn-${videoId}`);
    if (btn) { btn.textContent = '✓'; btn.classList.add('added'); }
    queue.push({ videoId, title, thumb });
    await saveQueue();
    showToast(`Added to queue!`);
  }

  window.removeFromQueue = async function(index) {
    const removed = queue.splice(index, 1)[0];
    if (removed) addedIds.delete(removed.videoId);
    await saveQueue();
  };

  window.clearQueue = async function() {
    queue = [];
    addedIds.clear();
    await saveQueue();
  };

  function renderPhoneQueue() {
    const list = document.getElementById('phone-queue-list');
    const count = document.getElementById('queue-count');
    if (!list) return;
    if (count) count.textContent = queue.length;
    if (queue.length === 0) { list.innerHTML = '<div class="empty-state">No songs queued yet</div>'; return; }
    list.innerHTML = '';
    queue.forEach((item, i) => {
      const isPlaying = currentVideo?.videoId === item.videoId;
      const el = document.createElement('div');
      el.className = `queue-item${isPlaying ? ' playing' : ''}`;
      el.innerHTML = `
        <div class="queue-num">${isPlaying ? '♪' : i + 1}</div>
        <img class="queue-thumb" src="${item.thumb}" alt="">
        <div class="queue-title">${esc(item.title)}</div>
        <button class="remove-btn" onclick="window.removeFromQueue(${i})">✕</button>
      `;
      list.appendChild(el);
    });
  }

  // ── TV ──
  function renderTVPlayer() {
    const overlay = document.getElementById('tv-overlay');
    const nowTitle = document.getElementById('tv-now-title');
    const idleText = document.getElementById('tv-idle-text');
    const playBtn = document.getElementById('tv-play-btn');
    if (!overlay) return;

    overlay.style.display = 'flex';

    if (currentVideo) {
      if (nowTitle) nowTitle.textContent = currentVideo.title;
      if (idleText) idleText.textContent = `Up: ${currentVideo.title}`;
      if (playBtn) playBtn.classList.remove('hidden');
    } else {
      if (nowTitle) nowTitle.textContent = '—';
      if (idleText) idleText.textContent = 'Add songs from your phone to start';
      if (playBtn) playBtn.classList.add('hidden');
    }
  }

  window.openCurrentVideo = function() {
    if (!currentVideo) return;
    window.open(`https://www.youtube.com/watch?v=${currentVideo.videoId}`, '_blank');
  };

  function renderTVQueue() {
    const qs = document.getElementById('tv-queue-scroll');
    if (!qs) return;
    if (queue.length === 0) { qs.innerHTML = '<div style="color:var(--muted);font-size:13px;">Queue is empty</div>'; return; }
    qs.innerHTML = '';
    queue.forEach((item, i) => {
      const chip = document.createElement('div');
      chip.className = 'tv-queue-chip';
      chip.innerHTML = `<div class="tv-chip-num">${i + 1}</div><div class="tv-chip-title">${esc(item.title)}</div>`;
      qs.appendChild(chip);
    });
  }

  window.playNext = async function() {
    if (queue.length === 0) return;
    currentVideo = queue.shift();
    addedIds.delete(currentVideo.videoId);
    await saveQueue();
    await saveCurrent();
    // Auto open YouTube
    window.open(`https://www.youtube.com/watch?v=${currentVideo.videoId}`, '_blank');
  };

  window.skipSong = async function() {
    currentVideo = null;
    await saveCurrent();
    if (queue.length > 0) await window.playNext();
  };

  // ── Utils ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
